name: 'LORE Security & Architecture Audit'
description: 'Runs LORE security & architecture audits on PR changes and comments on the PR'
inputs:
  project:
    description: 'Path to the project to analyze (default: current directory)'
    required: false
    default: '.'
  github_token:
    description: 'GitHub Token to post the PR comment (e.g. ${{ secrets.GITHUB_TOKEN }})'
    required: true
  commit_range:
    description: 'Commit range to check (e.g. origin/main...HEAD)'
    required: false
    default: 'origin/main...HEAD'
  changed_files:
    description: 'Comma/newline separated list of changed files'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f "${{ github.action_path }}/requirements.txt" ]; then
          python -m pip install -r "${{ github.action_path }}/requirements.txt"
        else
          python -m pip install anthropic rich
        fi

    - name: Run LORE Audit Check
      shell: bash
      id: lore-audit
      run: |
        CMD="python ${{ github.action_path }}/lore.py gh-check --project ${{ inputs.project }}"
        
        if [ -n "${{ inputs.changed_files }}" ]; then
          echo "${{ inputs.changed_files }}" | tr ',' '\n' > changed_files.txt
          CMD="$CMD --changed-files changed_files.txt"
        elif [ -n "${{ inputs.commit_range }}" ]; then
          CMD="$CMD --commit-range ${{ inputs.commit_range }}"
        fi
        
        echo "Running command: $CMD"
        $CMD > lore_report.md
        cat lore_report.md

    - name: Comment PR
      uses: actions/github-script@v6
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('lore_report.md', 'utf8');
          
          // Find context variables
          const { owner, repo, number } = context.issue;
          if (!number) {
            console.log("Not a Pull Request or issue context. Skipping comment.");
            return;
          }
          
          // Add comment
          await github.rest.issues.createComment({
            owner,
            repo,
            issue_number: number,
            body: report
          });
