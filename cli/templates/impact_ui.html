<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LORE - Impact Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F4F5;
  --surface:#FFFFFF;
  --border:#E4E4E7;
  --text:#09090B;
  --muted:#71717A;
  --accent:#2563EB;
  
  /* YC Dark Sidebar Palette */
  --sb-bg:#18181B;
  --sb-border:#27272A;
  --sb-text:#FAFAFA;
  --sb-muted:#A1A1AA;
  
  --mono:"JetBrains Mono","SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --serif:"Fraunces",serif;
}

/* Modificato: rimosso l'overflow nascosto e l'altezza fissa */
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:row;
  font-size:13px;
  -webkit-font-smoothing:antialiased;
}

/* --- SIDEBAR --- */
/* Modificato: aggiunta posizione sticky per rimanere fissa durante lo scorrimento della pagina */
aside{
  width:350px;
  min-width:250px;
  max-width:55vw;
  background:var(--sb-bg);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  z-index:10;
  position:sticky;
  top:0;
  height:100vh;
}

.logo-area{padding:20px 24px;border-bottom:1px solid var(--sb-border);
  display:flex;align-items:center;gap:8px;}
.logo{font-family:var(--serif);font-size:18px;font-weight:700;
  letter-spacing:-0.02em;color:var(--sb-text);}
.logo span{font-family:var(--sans);font-size:13px;color:var(--sb-muted);
  font-weight:500;opacity:0.7;letter-spacing:normal;text-transform:none;}

.risk-panel{padding:24px;border-bottom:1px solid var(--sb-border);flex-shrink:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);}
.risk-sub{font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--sb-muted);margin-bottom:12px;}
.risk-num{font-family:var(--serif);font-size:56px;line-height:0.9;
  font-weight:700;color:{{RISK_HEX}};}
.risk-bar{height:4px;background:var(--sb-border);border-radius:4px;
  margin-top:16px;overflow:hidden;}
.risk-fill{height:100%;border-radius:4px;width:0;
  transition:width 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
  background:{{RISK_HEX}};box-shadow:0 0 12px {{RISK_HEX}};}
.risk-verdict{font-size:12px;color:var(--sb-text);margin-top:12px;
  font-weight:500;display:flex;align-items:center;gap:8px;}
.risk-verdict::before{content:'';display:inline-block;width:6px;height:6px;
  border-radius:50%;background:{{RISK_HEX}};box-shadow:0 0 8px {{RISK_HEX}};}

.sb-hdr{padding:16px 24px 8px;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.08em;color:var(--sb-muted);flex-shrink:0;}
#file-list{overflow-y:auto;flex:1;padding:0 16px 16px;}
.fi{padding:8px 12px;border-radius:6px;cursor:pointer;display:flex;
  align-items:center;gap:10px;margin-bottom:2px;border:1px solid transparent;
  transition:all 0.15s ease;}
.fi:hover{background:rgba(255,255,255,0.05);}
.fi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.fi-name{font-family:var(--mono);font-size:11.5px;color:var(--sb-muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.fi:hover .fi-name{color:var(--sb-text);}

.fi-tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0;}

.tag-critical{background:rgba(239,68,68,0.15);color:#FCA5A5;border:1px solid rgba(239,68,68,0.25);}
.tag-watch{background:rgba(245,158,11,0.15);color:#FCD34D;border:1px solid rgba(245,158,11,0.25);}
.tag-dep{background:rgba(34,197,94,0.1);color:#86EFAC;border:1px solid rgba(34,197,94,0.2);}

.sb-foot{padding:12px 24px;border-top:1px solid var(--sb-border);
  font-size:11px;font-weight:500;color:var(--sb-muted);flex-shrink:0;}

/* --- RESIZER --- */
.resizer {
  width: 4px;
  background-color: var(--sb-border);
  cursor: ew-resize;
  flex-shrink: 0;
  z-index: 20;
  transition: background-color 0.2s ease;
  position: sticky;
  top: 0;
  height: 100vh;
}
.resizer:hover, .resizer.resizing {
  background-color: var(--accent);
}

/* --- RIGHT PANEL --- */
/* Modificato: rimosso l'overflow hidden per permettere alla pagina di crescere */
.right-panel{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0; 
}

/* Modificato: aggiunto position sticky per farlo rimanere in alto */
header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 32px;
  height:60px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 1px 2px 0 rgba(0,0,0,0.03);
  z-index:5;
  position:sticky;
  top:0;
}

.h-task{font-size:13px;color:var(--muted);flex:1;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;margin-right:24px;}
.h-task strong{color:var(--text);font-weight:600;}
.h-stats{display:flex;gap:20px;flex-shrink:0;}
.h-stat{font-size:12px;color:var(--muted);display:flex;align-items:baseline;gap:6px;}
.h-stat strong{font-family:var(--mono);color:var(--text);font-weight:600;font-size:13px;}

/* Modificato: rimosso l'overflow automatico, ora è la pagina a scrollare */
main{
  padding:32px 40px;
  display:flex;
  flex-direction:column;
}

/* Markdown / Content Styling */
h2{color:var(--text);margin:32px 0 12px;font-size:14px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.05em;padding-bottom:8px;
  border-bottom:1px solid var(--border);}
h2:first-child{margin-top:0;}
h3{color:var(--text);margin:20px 0 8px;font-size:14px;font-weight:600;}
p{margin:8px 0;line-height:1.6;color:var(--text);}
ul{margin:8px 0 8px 24px;color:var(--text);}
li{margin:4px 0;line-height:1.6;}

/* MODIFICATO: forzato a espandersi per intero verticalmente senza scrollbar */
pre{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:16px;
  overflow-x:auto; /* Mantiene lo scroll orizzontale in caso di righe lunghissime */
  overflow-y:hidden; /* Nasconde la barra di scorrimento verticale */
  max-height:none !important; /* Forza l'espansione per tutta l'altezza del testo */
  margin:12px 0;
  font-family:var(--mono);
  font-size:12px;
  color:var(--text);
  white-space:pre;
  box-shadow:0 1px 2px rgba(0,0,0,0.02);
}

code.ic{background:var(--surface);padding:2px 6px;border-radius:4px;
  color:var(--accent);font-family:var(--mono);font-size:11.5px;
  border:1px solid var(--border);font-weight:500;}
strong{color:var(--text);font-weight:600;}
a.fa{color:var(--accent);text-decoration:none;font-weight:500;}
a.fa:hover{text-decoration:underline;}

.md-table{border-collapse:separate;border-spacing:0;width:100%;margin:16px 0;
  font-size:13px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.02);}
.md-table th, .md-table td{border-bottom:1px solid var(--border);
  padding:12px 16px;text-align:left;vertical-align:top;}
.md-table th{background:#FAFAFA;font-weight:600;color:var(--muted);
  font-size:11px;text-transform:uppercase;letter-spacing:0.05em;}
.md-table tr:last-child td{border-bottom:none;}
.md-table tr:hover td{background:#FAFAFA;}

.callout{border-left:3px solid var(--accent);background:var(--surface);
  padding:16px 20px;border-radius:0 8px 8px 0;margin:16px 0;font-size:13px;
  line-height:1.6;box-shadow:0 1px 2px rgba(0,0,0,0.02);
  border:1px solid var(--border);border-left-width:3px;}

/* Scrollbars - Ora si applicano alla finestra del browser */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}
aside ::-webkit-scrollbar-thumb{background:#3F3F46;}
aside ::-webkit-scrollbar-thumb:hover{background:#52525B;}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="logo-area">
    <div class="logo">LORE <span>/ Impact Analysis</span></div>
  </div>
  <div class="risk-panel">
    <div class="risk-sub">Global Risk Score</div>
    <div class="risk-num">{{RISK}}</div>
    <div class="risk-bar">
      <div class="risk-fill" id="rbar"></div>
    </div>
    <div class="risk-verdict">{{RISK_LABEL}}</div>
  </div>
  <div class="sb-hdr">Impacted Files</div>
  <div id="file-list">{{SIDEBAR_ITEMS}}</div>
  <div class="sb-foot">{{FILE_COUNT}} files detected</div>
</aside>

<div class="resizer" id="dragMe"></div>

<div class="right-panel">
  <header>
    <div class="h-task">Query: <strong>{{TASK_ESC}}</strong></div>
    <div class="h-stats">
      <div class="h-stat"><strong>{{SYM_COUNT}}</strong> symbols</div>
      <div class="h-stat"><strong>{{LINK_COUNT}}</strong> decision links</div>
      <div class="h-stat"><strong>{{HOT_COUNT}}</strong> hotspots</div>
    </div>
  </header>
  <main id="analysis">{{ANALYSIS_HTML}}</main>
</div>

<script>
var analysisText = {{ANALYSIS_JS}};
setTimeout(function(){
  var bar = document.getElementById('rbar');
  if (bar) bar.style.width = '{{RISK}}%';
}, 200);

function goToFile(idx) {
  var el = document.getElementById('file-' + idx);
  if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

// --- LOGICA DI RIDIMENSIONAMENTO SIDEBAR ---
const resizer = document.getElementById('dragMe');
const sidebar = document.getElementById('sidebar');

let x = 0;
let w = 0;

const mouseDownHandler = function(e) {
    x = e.clientX;
    const styles = window.getComputedStyle(sidebar);
    w = parseInt(styles.width, 10);

    document.addEventListener('mousemove', mouseMoveHandler);
    document.addEventListener('mouseup', mouseUpHandler);
    
    resizer.classList.add('resizing');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'ew-resize';
};

const mouseMoveHandler = function(e) {
    const dx = e.clientX - x;
    sidebar.style.width = `${w + dx}px`;
};

const mouseUpHandler = function() {
    resizer.classList.remove('resizing');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';

    document.removeEventListener('mousemove', mouseMoveHandler);
    document.removeEventListener('mouseup', mouseUpHandler);
};

resizer.addEventListener('mousedown', mouseDownHandler);
</script>
</body>
</html>
