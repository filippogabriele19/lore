<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LORE - Full Audit · {{PROJ}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F8FAFC;--surface:#FFFFFF;--border:#E2E8F0;
  --text:#0F172A;--muted:#64748B;--accent:#6366F1;--code-bg:#F1F5F9;
  --mono:"SFMono-Regular",Consolas,monospace}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--text);height:100vh;
  display:flex;flex-direction:column;overflow:hidden;font-size:14px}
header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 24px;flex-shrink:0;display:flex;align-items:center;gap:20px}
.logo{font-size:.85rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--accent)}
.logo span{color:var(--muted);font-weight:400}
.h-project{font-size:.82rem;color:var(--text);font-weight:600;flex:1}
.h-date{font-size:.75rem;color:var(--muted)}
.h-stats{display:flex;gap:20px}
.h-stat{font-size:.75rem;color:var(--muted)}
.h-stat strong{color:var(--text);font-weight:600}
.summary-bar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 24px;display:flex;align-items:center;gap:24px;flex-shrink:0}
.sum-badge{display:flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600}
.sum-dot{width:10px;height:10px;border-radius:50%}
#layout{display:flex;flex:1;overflow:hidden}
nav{width:240px;background:var(--surface);border-right:1px solid var(--border);
  padding:12px 0;overflow-y:auto;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;
  text-decoration:none;color:var(--text);border-left:3px solid transparent;
  transition:background .15s}
.nav-item:hover{background:#F1F5F9}
.nav-item:target,.nav-item.active{border-left-color:var(--accent);background:#EEF2FF}
.nav-icon{font-size:.95rem;flex-shrink:0}
.nav-label{font-size:.8rem;flex:1}
.nav-badge{font-size:.65rem;padding:2px 7px;border-radius:999px;color:#fff;font-weight:700}
main{flex:1;overflow-y:auto;padding:28px 36px}
.audit-section{margin-bottom:40px}
h2{color:var(--accent);font-size:1rem;font-weight:600;margin-bottom:16px;
  padding-bottom:8px;border-bottom:1px solid var(--border)}
.card{background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:16px 20px;margin-bottom:12px}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.card-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.card-title{font-size:.88rem;font-weight:600;flex:1}
.card-metric{font-size:.75rem;color:var(--muted);font-family:var(--mono);
  margin-bottom:6px}
.card-file{font-size:.72rem;font-family:var(--mono);color:var(--accent);
  margin-bottom:3px}
.card-file.secondary{color:var(--muted)}
.card-desc{font-size:.82rem;color:var(--muted);line-height:1.55;margin-top:8px}
.fi-tag{font-size:.65rem;padding:2px 7px;border-radius:999px;
  font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.tag-critical{background:#FEE2E2;color:#B91C1C}
.tag-watch{background:#FEF3C7;color:#92400E}
.tag-dep{background:#DCFCE7;color:#166534}
.risk-big{font-family:"Fraunces",serif;font-size:48px;font-weight:700;line-height:1}
</style>
</head>
<body>
<header>
  <div class="logo">LORE <span>/ Full Audit</span></div>
  <div class="h-project">{{PROJ}}</div>
  <div class="h-date">{{DATE_STR}}</div>
  <div class="h-stats">
    <div class="h-stat"><strong>{{SYM}}</strong> symbols</div>
    <div class="h-stat"><strong>{{LNK}}</strong> decision links</div>
    <div class="h-stat"><strong>{{HOT}}</strong> hotspots</div>
    <div class="h-stat"><strong>{{VE}}</strong> virtual edges</div>
  </div>
</header>
<div class="summary-bar">
  <div class="sum-badge">
    <div class="sum-dot" style="background:#EF4444"></div>
    <span style="color:#EF4444">{{N_CRITICAL}} critical</span>
  </div>
  <div class="sum-badge">
    <div class="sum-dot" style="background:#F59E0B"></div>
    <span style="color:#F59E0B">{{N_WARNING}} warning</span>
  </div>
  <div class="sum-badge">
    <div class="sum-dot" style="background:#22C55E"></div>
    <span style="color:#22C55E">{{N_INFO}} info</span>
  </div>
  <span style="font-size:.78rem;color:var(--muted);margin-left:8px">
    {{N_TOTAL}} findings totali — analisi deterministica sul Knowledge Graph
  </span>
</div>
<div id="layout">
  <nav>{{NAV_ITEMS}}</nav>
  <main>{{SECTIONS_HTML}}</main>
</div>
</body></html>
